networks:
  dry-sun:
    driver: bridge
    name: dry-sun
services:
  db:
    environment:
      POSTGRES_MULTIPLE_DATABASES: rekuest,kabinet,mikro,fluss,kraph
      POSTGRES_PASSWORD: 30ae0f6d873a75e6ca8d25f98033f849
      POSTGRES_USER: sleepyviolettarsier
    image: jhnnsrs/daten:dev
    volumes:
    - ./db_data:/var/lib/postgresql/data
  fluss:
    command: bash run.sh
    depends_on:
    - redis
    - db
    - minio
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 300s
    image: jhnnsrs/fluss:next
    stop_grace_period: 2s
    volumes:
    - ./configs/fluss.yaml:/workspace/config.yaml
  gateway:
    image: caddy:latest
    networks:
    - dry-sun
    - default
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./configs/Caddyfile:/etc/caddy/Caddyfile
  kabinet:
    command: bash run.sh
    depends_on:
    - redis
    - db
    - minio
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 300s
    image: jhnnsrs/kabinet:next
    stop_grace_period: 2s
    volumes:
    - ./configs/kabinet.yaml:/workspace/config.yaml
  kraph:
    command: bash run.sh
    depends_on:
    - redis
    - db
    - minio
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 300s
    image: jhnnsrs/kraph:dev
    stop_grace_period: 2s
    volumes:
    - ./configs/kraph.yaml:/workspace/config.yaml
  mikro:
    command: bash run.sh
    depends_on:
    - redis
    - db
    - minio
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 300s
    image: jhnnsrs/mikro:next
    stop_grace_period: 2s
    volumes:
    - ./configs/mikro.yaml:/workspace/config.yaml
  minio:
    command: server /data
    environment:
      MINIO_ROOT_PASSWORD: puuazl5pfyci33dudlhlaeuvh5lkmtrit11d34z9
      MINIO_ROOT_USER: wandering-feather
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    stop_grace_period: 2s
    volumes:
    - /data:/data
  minio_init:
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_HOST: http://minio:9000
      MINIO_ROOT_PASSWORD: puuazl5pfyci33dudlhlaeuvh5lkmtrit11d34z9
      MINIO_ROOT_USER: wandering-feather
    image: jhnnsrs/init:dev
    stop_grace_period: 2s
    volumes:
    - ./configs/minio_init.yaml:/workspace/config.yaml
  redis:
    image: redis:latest
  rekuest:
    command: bash run.sh
    depends_on:
    - redis
    - db
    - minio
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 300s
    image: jhnnsrs/rekuest:next
    stop_grace_period: 2s
    volumes:
    - ./configs/rekuest.yaml:/workspace/config.yaml
volumes: {}
