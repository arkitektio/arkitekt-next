name: CI
on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
jobs:
  test_suit:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run tests
        shell: bash
        run: |
          # Docker-backed tests (needs_docker) only run on Linux runners, which
          # ship a working docker daemon. macOS/Windows GitHub runners have none,
          # so deselect them there (they also auto-skip via conftest as a backstop).
          if [ "$RUNNER_OS" = "Linux" ]; then
            uv run pytest -m "not integration"
          else
            uv run pytest -m "not integration and not needs_docker"
          fi

  test-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest -m "not integration"
